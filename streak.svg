<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="320" height="80" rx="12" fill="url(#bg)" />

  <!-- Streak icon -->
  <text x="20" y="42" font-size="28" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">🔥</text>

  <!-- Streak count -->
  <text x="60" y="38" font-size="28" font-weight="bold" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif">0일</text>
  <text x="60" y="58" font-size="12" fill="#8892b0" font-family="Segoe UI, Arial, sans-serif">현재 스트릭 (2026-05-30 미제출)</text>

  <!-- Stats on right -->
  <text x="220" y="30" font-size="11" fill="#64ffda" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">최장</text>
  <text x="220" y="46" font-size="18" font-weight="bold" fill="#64ffda" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">8일</text>

  <text x="285" y="30" font-size="11" fill="#ccd6f6" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">총 퀴즈</text>
  <text x="285" y="46" font-size="18" font-weight="bold" fill="#ccd6f6" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">9개</text>

  <!-- Bottom bar -->
  <rect x="20" y="68" width="280" height="3" rx="2" fill="#1d3557" />
  <rect x="20" y="68" width="0" height="3" rx="2" fill="#64ffda" />
</svg>
