<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 90" width="280" height="90">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="280" height="90" rx="10" fill="url(#bg)"/>
  <rect width="280" height="90" rx="10" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <!-- Fire icon area -->
  <text x="22" y="58" font-family="Segoe UI Emoji,Apple Color Emoji,Noto Color Emoji,sans-serif" font-size="36">🔥</text>
  <!-- Current streak section -->
  <text x="72" y="36" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">현재 스트릭</text>
  <text x="72" y="64" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="28" font-weight="bold" fill="#f85149">0일</text>
  <!-- Divider -->
  <line x1="168" y1="18" x2="168" y2="72" stroke="#30363d" stroke-width="1"/>
  <!-- Max streak section -->
  <text x="180" y="36" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">최장 스트릭</text>
  <text x="180" y="64" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="28" font-weight="bold" fill="#3fb950">2일</text>
  <!-- Status text -->
  <text x="140" y="84" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="9" fill="#484f58" text-anchor="middle">2026-05-28 업데이트 · 총 7문제</text>
</svg>
